name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release?'
        type: boolean
        default: false

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Node 20 ─────────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ── Build React app ─────────────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web app
        working-directory: frontend
        run: npm run build

      # ── Sync Capacitor ───────────────────────────────────────────────────────
      - name: Sync Capacitor Android
        working-directory: frontend
        run: npx cap sync android

      # ── Build Debug APK ─────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then VERSION="dev-$(date +%Y%m%d-%H%M)"; fi
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             adaptive-ai-engine-${VERSION}.apk
          echo "APK_PATH=adaptive-ai-engine-${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_NAME=adaptive-ai-engine-${VERSION}.apk" >> $GITHUB_ENV

      # ── Upload artifact (always) ─────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── GitHub Release (on tag push or manual trigger) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Adaptive AI Engine ${{ github.ref_name }}
          body: |
            ## Adaptive AI Engine — Android APK

            Install on any Android device (Android 7+):
            1. Download the APK below
            2. Enable **Install from unknown sources** in Settings
            3. Tap the APK to install
            4. On first launch, enter your backend server URL in Settings

            ### What's included
            - Multi-model AI chat (OpenAI / Claude / Gemini / Ollama)
            - Adaptive routing with feedback learning
            - Local memory with semantic search
            - Security: JWT auth, prompt injection defense, rate limiting
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
